name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      run: npm ci

    # Canonical quality gate — the SAME command as the local release gate
    # (prepublishOnly): biome check, src typecheck, tests/conformance
    # typecheck, build, publint + attw, knip, unit + integration tests.
    - name: Quality gate (npm run ci)
      run: npm run ci
      env:
        MONGODB_URI: mongodb://localhost:27017/mongokit-test

    - name: Verify package can be packed
      run: npm pack --dry-run
